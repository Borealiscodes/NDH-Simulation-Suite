<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="40%" stop-color="#3b4b7f"/>
      <stop offset="80%" stop-color="#9ad5ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <radialGradient id="spacerGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe6a8"/>
      <stop offset="50%" stop-color="#ff7b6b"/>
      <stop offset="100%" stop-color="#3c1b3c"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <circle id="shipNode" r="12" fill="#ffffff"/>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="700" fill="#05060a"/>

  <!-- Central jump gate -->
  <rect x="480" y="160" width="240" height="380" rx="40" ry="40"
        fill="url(#gateGrad)" stroke="#ffffff" stroke-width="2" filter="url(#softGlow)"/>
  <text x="600" y="180" fill="#ffffff" font-size="18" font-family="monospace" text-anchor="middle">
    Jump Gate Metric
  </text>

  <!-- Spacers embedded in gate -->
  <ellipse cx="600" cy="350" rx="90" ry="140"
           fill="url(#spacerGrad)" opacity="0.9" filter="url(#softGlow)"/>
  <text x="600" y="350" fill="#0b0c10" font-size="16" font-family="monospace" text-anchor="middle" dy="5">
    Spacers
  </text>
  <text x="600" y="375" fill="#0b0c10" font-size="12" font-family="monospace" text-anchor="middle">
    Metric-Embedded Operators
  </text>

  <!-- Incoming fleet trajectories (normal) -->
  <line x1="200" y1="220" x2="480" y2="260" stroke="#9ad5ff" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="200" y1="320" x2="480" y2="320" stroke="#9ad5ff" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="200" y1="420" x2="480" y2="380" stroke="#9ad5ff" stroke-width="2" stroke-dasharray="6,4"/>

  <use href="#shipNode" x="200" y="220" fill="#9ad5ff" filter="url(#softGlow)"/>
  <use href="#shipNode" x="200" y="320" fill="#9ad5ff" filter="url(#softGlow)"/>
  <use href="#shipNode" x="200" y="420" fill="#9ad5ff" filter="url(#softGlow)"/>

  <!-- Outgoing trajectories (normal mode) -->
  <line x1="720" y1="260" x2="1000" y2="220" stroke="#9ad5ff" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="720" y1="320" x2="1000" y2="320" stroke="#9ad5ff" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="720" y1="380" x2="1000" y2="420" stroke="#9ad5ff" stroke-width="2" stroke-dasharray="6,4"/>

  <use href="#shipNode" x="1000" y="220" fill="#9ad5ff" filter="url(#softGlow)"/>
  <use href="#shipNode" x="1000" y="320" fill="#9ad5ff" filter="url(#softGlow)"/>
  <use href="#shipNode" x="1000" y="420" fill="#9ad5ff" filter="url(#softGlow)"/>

  <!-- Sabotaged collapse point -->
  <circle cx="900" cy="320" r="26" fill="#ff7b6b" filter="url(#softGlow)" opacity="0.95"/>
  <text x="900" y="320" fill="#0b0c10" font-size="13" font-family="monospace" text-anchor="middle" dy="5">
    X*
  </text>
  <text x="900" y="350" fill="#ffb36b" font-size="12" font-family="monospace" text-anchor="middle">
    Fleet Self-Intersection
  </text>

  <!-- Sabotage overlay arrows -->
  <path d="M 720 260 L 900 320" stroke="#ff7b6b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 720 320 L 900 320" stroke="#ff7b6b" stroke-width="3" stroke-linecap="round"/>
  <path d="M 720 380 L 900 320" stroke="#ff7b6b" stroke-width="3" stroke-linecap="round"/>

  <!-- NDH labels -->
  <text x="600" y="560" fill="#ffffff" font-size="14" font-family="monospace" text-anchor="middle">
    NDH Jump Gate Tensor — Spacers as Metric Controllers, Fleet as Trajectory Field
  </text>
  <text x="600" y="590" fill="#9ad5ff" font-size="12" font-family="monospace" text-anchor="middle">
    J^i_α: Ship trajectories • X*: Collapse point • Spacers: Embedded governance in geometry
  </text>
</svg>
