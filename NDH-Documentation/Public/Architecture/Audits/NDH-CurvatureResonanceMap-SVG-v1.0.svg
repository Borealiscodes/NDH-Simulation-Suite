  <ellipse cx="650" cy="300" rx="100" ry="80" fill="#ff3b3b" fill-opacity="0.45"/>
  <ellipse cx="650" cy="300" rx="75" ry="60" fill="#ff9f1a" fill-opacity="0.40"/>
  <ellipse cx="650" cy="300" rx="50" ry="40" fill="#ffd94a" fill-opacity="0.35"/>
  <ellipse cx="650" cy="300" rx="30" ry="25" fill="#4a90e2" fill-opacity="0.45"/>

  <text x="600" y="230" font-size="14" fill="#ffffff" font-family="Arial">
