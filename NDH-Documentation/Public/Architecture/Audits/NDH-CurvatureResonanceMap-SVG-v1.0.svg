  <!-- Axes -->
  <line x1="120" y1="150" x2="120" y2="640" stroke="#666666" stroke-width="2"/>
  <line x1="120" y1="640" x2="1100" y2="640" stroke="#666666" stroke-width="2"/>

  <text x="80" y="160" font-size="14" fill="#cccccc" font-family="Arial" transform="rotate(-90 80,160)">
