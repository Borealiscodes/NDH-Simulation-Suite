  </text>

  <!-- July super-epoch resonance (3,314 commits + 722 PRs) -->
  <ellipse cx="850" cy="260" rx="130" ry="95" fill="#ff0055" fill-opacity="0.45"/>
  <ellipse cx="850" cy="260" rx="100" ry="75" fill="#ff3b3b" fill-opacity="0.40"/>
  <ellipse cx="850" cy="260" rx="75" ry="55" fill="#ff9f1a" fill-opacity="0.35"/>
  <ellipse cx="850" cy="260" rx="50" ry="38" fill="#ffd94a" fill-opacity="0.35"/>
  <ellipse cx="850" cy="260" rx="30" ry="24" fill="#4a90e2" fill-opacity="0.45"/>

