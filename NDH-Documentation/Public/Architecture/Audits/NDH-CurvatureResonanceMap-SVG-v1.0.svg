  </text>

  <!-- July 7: Governance spine resonance -->
  <ellipse cx="520" cy="360" rx="70" ry="55" fill="#ff9f1a" fill-opacity="0.45"/>
  <ellipse cx="520" cy="360" rx="45" ry="35" fill="#ffd94a" fill-opacity="0.35"/>
  <ellipse cx="520" cy="360" rx="28" ry="22" fill="#4a90e2" fill-opacity="0.45"/>

  <text x="470" y="305" font-size="14" fill="#ffffff" font-family="Arial">
    Governance resonance:
  </text>
  <text x="470" y="323" font-size="13" fill="#cccccc" font-family="Arial">
