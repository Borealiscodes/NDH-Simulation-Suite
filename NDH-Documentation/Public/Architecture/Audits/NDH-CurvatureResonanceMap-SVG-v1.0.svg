  <line x1="260" y1="640" x2="260" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="360" y1="640" x2="360" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="520" y1="640" x2="520" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="650" y1="640" x2="650" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="850" y1="640" x2="850" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Legend -->
