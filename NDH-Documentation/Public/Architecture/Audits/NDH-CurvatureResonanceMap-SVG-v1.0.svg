  <!-- Resonance blobs (heat-like regions) -->

  <!-- June 22–27: Genesis resonance (Atlas, uma, Origin) -->
  <ellipse cx="260" cy="520" rx="80" ry="60" fill="#ff3b3b" fill-opacity="0.35"/>
  <ellipse cx="260" cy="520" rx="55" ry="40" fill="#ff9f1a" fill-opacity="0.35"/>
  <ellipse cx="260" cy="520" rx="35" ry="25" fill="#ffd94a" fill-opacity="0.35"/>
  <ellipse cx="260" cy="520" rx="20" ry="15" fill="#4a90e2" fill-opacity="0.45"/>

  <text x="210" y="470" font-size="14" fill="#ffffff" font-family="Arial">
    Genesis resonance:
  </text>
  <text x="210" y="488" font-size="13" fill="#cccccc" font-family="Arial">
    Join + Atlas • uma • Origin
  </text>

  <!-- Late June: 1,420-commit burst resonance -->
  <ellipse cx="360" cy="440" rx="90" ry="70" fill="#ff3b3b" fill-opacity="0.35"/>
  <ellipse cx="360" cy="440" rx="65" ry="50" fill="#ff9f1a" fill-opacity="0.35"/>
  <ellipse cx="360" cy="440" rx="40" ry="30" fill="#ffd94a" fill-opacity="0.35"/>
  <ellipse cx="360" cy="440" rx="22" ry="18" fill="#4a90e2" fill-opacity="0.45"/>

  <text x="310" y="380" font-size="14" fill="#ffffff" font-family="Arial">
