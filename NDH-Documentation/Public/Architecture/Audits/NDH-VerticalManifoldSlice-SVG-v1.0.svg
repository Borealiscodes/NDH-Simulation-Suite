<svg width="1200" height="720" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="720" fill="#05060a"/>

  <!-- Title -->
  <text x="60" y="70" font-size="34" fill="#ffffff" font-family="Arial" font-weight="bold">
    NDH Vertical Manifold Slice — June–July 2026
  </text>
  <text x="60" y="105" font-size="18" fill="#cccccc" font-family="Arial">
    Cross-section of NDH layers over verified GitHub epochs
  </text>

  <!-- Vertical slice frame -->
  <rect x="420" y="140" width="360" height="520" rx="18" fill="#111318" stroke="#333333" stroke-width="2"/>

  <!-- Layer bands inside slice -->

  <!-- Conversational (top, lowest curvature) -->
  <rect x="440" y="160" width="320" height="100" fill="#1b2b40"/>
  <text x="455" y="195" font-size="22" fill="#ffffff" font-family="Arial" font-weight="bold">
    Conversational Drift
  </text>
  <text x="455" y="220" font-size="14" fill="#d0e4ff" font-family="Arial">
    Docs • micro-commits • README drift • style evolution
  </text>

  <!-- Orbital soft-state -->
  <rect x="440" y="270" width="320" height="110" fill="#3b3a16"/>
  <text x="455" y="305" font-size="22" fill="#ffffff" font-family="Arial" font-weight="bold">
    Orbital Soft-State
  </text>
  <text x="455" y="330" font-size="14" fill="#fff3b0" font-family="Arial">
    Continuity fields • mascots • tone stabilization • surreal comfort
  </text>

  <!-- Governance -->
  <rect x="440" y="390" width="320" height="120" fill="#4a2b0a"/>
  <text x="455" y="425" font-size="22" fill="#ffffff" font-family="Arial" font-weight="bold">
    Governance Layer
  </text>
  <text x="455" y="450" font-size="14" fill="#ffd9a0" font-family="Arial">
    NDH-Governance-Spine • PR bursts • constitutional archives • indices
  </text>

  <!-- Manifold (deepest layer) -->
  <rect x="440" y="520" width="320" height="120" fill="#3b0a12"/>
  <text x="455" y="555" font-size="22" fill="#ffffff" font-family="Arial" font-weight="bold">
    Manifold Layer
  </text>
  <text x="455" y="580" font-size="14" fill="#ffb3c4" font-family="Arial">
    NDH-Origin-Layer • NDH-Simulation-Suite • Atlas-Architecture • NDH-Math-Spine
  </text>

  <!-- Epoch markers on the side (left) -->
  <text x="160" y="190" font-size="16" fill="#ffffff" font-family="Arial">
    Jun 22: Join GitHub + Atlas
  </text>
  <line x1="260" y1="185" x2="420" y2="185" stroke="#4a90e2" stroke-width="2" stroke-dasharray="4,6"/>

  <text x="160" y="240" font-size="16" fill="#ffffff" font-family="Arial">
    Jun 23: uma-witness-literature
  </text>
  <line x1="260" y1="235" x2="420" y2="235" stroke="#4a90e2" stroke-width="2" stroke-dasharray="4,6"/>

  <text x="160" y="290" font-size="16" fill="#ffffff" font-family="Arial">
    Jun 27: NDH-Origin-Layer
  </text>
  <line x1="260" y1="285" x2="420" y2="285" stroke="#ff3b3b" stroke-width="2"/>

  <text x="160" y="340" font-size="16" fill="#ffffff" font-family="Arial">
    June: 1,420 commits (3 repos)
  </text>
  <line x1="310" y1="335" x2="420" y2="335" stroke="#ffbf00" stroke-width="2"/>

  <text x="160" y="410" font-size="16" fill="#ffffff" font-family="Arial">
    Jul 7: First PR (Governance Spine)
  </text>
  <line x1="310" y1="405" x2="420" y2="405" stroke="#ff9f1a" stroke-width="2"/>

  <text x="160" y="460" font-size="16" fill="#ffffff" font-family="Arial">
    Jul 11: 6 NDH repos created
  </text>
  <line x1="320" y1="455" x2="420" y2="455" stroke="#ff3b3b" stroke-width="2"/>

  <text x="160" y="510" font-size="16" fill="#ffffff" font-family="Arial">
    July: 3,314 commits + 722 PRs
  </text>
  <line x1="340" y1="505" x2="420" y2="505" stroke="#ff0055" stroke-width="2"/>

  <!-- Legend -->
  <rect x="820" y="180" width="300" height="220" rx="14" fill="#111318" stroke="#333333" stroke-width="1"/>
  <text x="840" y="205" font-size="18" fill="#ffffff" font-family="Arial" font-weight="bold">
    Legend — Vertical Manifold Slice
  </text>

  <rect x="840" y="230" width="20" height="20" fill="#3b0a12"/>
  <text x="870" y="245" font-size="14" fill="#ffffff" font-family="Arial">
    Manifold: deepest structural layer (tensor, geometry)
  </text>

  <rect x="840" y="260" width="20" height="20" fill="#4a2b0a"/>
  <text x="870" y="275" font-size="14" fill="#ffffff" font-family="Arial">
    Governance: rules, ethics, indices
  </text>

  <rect x="840" y="290" width="20" height="20" fill="#3b3a16"/>
  <text x="870" y="305" font-size="14" fill="#ffffff" font-family="Arial">
    Orbital soft-state: continuity, mascots, tone
  </text>

  <rect x="840" y="320" width="20" height="20" fill="#1b2b40"/>
  <text x="870" y="335" font-size="14" fill="#ffffff" font-family="Arial">
    Conversational: docs, style, drift
  </text>

  <text x="840" y="365" font-size="13" fill="#cccccc" font-family="Arial">
    Slice shows how June–July 2026 events sit across NDH layers.
  </text>

</svg>

