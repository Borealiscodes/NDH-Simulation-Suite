<svg width="1200" height="720" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="720" fill="#05060a"/>

  <!-- Title -->
  <text x="60" y="70" font-size="34" fill="#ffffff" font-family="Arial" font-weight="bold">
    NDH Recursion Epochs — Branching Lines SVG v1.0
  </text>

  <!-- Timeline axis -->
  <line x1="100" y1="120" x2="1100" y2="120" stroke="#888888" stroke-width="2" stroke-dasharray="4,6"/>
  <text x="100" y="105" font-size="16" fill="#cccccc" font-family="Arial">June 22, 2026</text>
  <text x="1040" y="105" font-size="16" fill="#cccccc" font-family="Arial">July 31, 2026</text>

  <!-- Epoch nodes on main axis -->
  <!-- Joined GitHub + Atlas -->
  <circle cx="150" cy="120" r="7" fill="#4a90e2"/>
  <text x="130" y="155" font-size="16" fill="#ffffff" font-family="Arial">
    Join GitHub + Atlas
  </text>

  <!-- uma-witness-literature -->
  <circle cx="220" cy="120" r="7" fill="#6cc4ff"/>
  <text x="190" y="185" font-size="16" fill="#ffffff" font-family="Arial">
    uma-witness-literature
  </text>

  <!-- NDH-Origin-Layer -->
  <circle cx="300" cy="120" r="7" fill="#88e0ff"/>
  <text x="260" y="215" font-size="16" fill="#ffffff" font-family="Arial">
    NDH-Origin-Layer
  </text>

  <!-- June commits burst -->
  <circle cx="380" cy="120" r="7" fill="#ffbf00"/>
  <text x="340" y="245" font-size="16" fill="#ffffff" font-family="Arial">
    June: 1,420 commits
  </text>

  <!-- July 7 first PR -->
  <circle cx="520" cy="120" r="7" fill="#ff7f00"/>
  <text x="480" y="275" font-size="16" fill="#ffffff" font-family="Arial">
    July 7: First PR (Governance Spine)
  </text>

  <!-- July 11 multi-repo genesis -->
  <circle cx="650" cy="120" r="7" fill="#ff2a2a"/>
  <text x="610" y="305" font-size="16" fill="#ffffff" font-family="Arial">
    July 11: 6 NDH repos
  </text>

  <!-- July super-epoch -->
  <circle cx="850" cy="120" r="7" fill="#ff0055"/>
  <text x="800" y="335" font-size="16" fill="#ffffff" font-family="Arial">
    July: 3,314 commits + 722 PRs
  </text>

  <!-- Branching recursion lines: layers -->

  <!-- Manifold layer branch -->
  <polyline points="300,120 340,180 420,240 520,300 650,360 850,420"
            fill="none" stroke="#ff3b3b" stroke-width="3"/>
  <text x="880" y="420" font-size="18" fill="#ff3b3b" font-family="Arial">
    Manifold recursion branch
  </text>

  <!-- Governance layer branch -->
  <polyline points="380,120 430,190 520,260 650,320 850,380"
            fill="none" stroke="#ff9f1a" stroke-width="3"/>
  <text x="880" y="380" font-size="18" fill="#ff9f1a" font-family="Arial">
    Governance recursion branch
  </text>

  <!-- Orbital soft-state branch -->
  <polyline points="220,120 260,170 340,220 520,280 650,340 850,400"
            fill="none" stroke="#ffd94a" stroke-width="3"/>
  <text x="880" y="400" font-size="18" fill="#ffd94a" font-family="Arial">
    Orbital soft-state branch
  </text>

  <!-- Conversational drift branch -->
  <polyline points="150,120 200,160 260,200 340,240 420,280 520,320 650,360 850,400 1000,440"
            fill="none" stroke="#4a90e2" stroke-width="2" stroke-dasharray="3,5"/>
  <text x="880" y="440" font-size="18" fill="#4a90e2" font-family="Arial">
    Conversational drift branch
  </text>

  <!-- Legend -->
  <rect x="60" y="520" width="380" height="160" rx="12" fill="#111318" stroke="#333333" stroke-width="1"/>

  <text x="80" y="550" font-size="20" fill="#ffffff" font-family="Arial" font-weight="bold">
    Legend — Recursion Branches
  </text>

  <circle cx="90" cy="580" r="6" fill="#ff3b3b"/>
  <text x="110" y="585" font-size="16" fill="#ffffff" font-family="Arial">
    Manifold recursion (NDH-Origin, Simulation, Atlas)
  </text>

  <circle cx="90" cy="610" r="6" fill="#ff9f1a"/>
  <text x="110" y="615" font-size="16" fill="#ffffff" font-family="Arial">
    Governance recursion (Spine, PR bursts)
  </text>

  <circle cx="90" cy="640" r="6" fill="#ffd94a"/>
  <text x="110" y="645" font-size="16" fill="#ffffff" font-family="Arial">
    Orbital soft-state (continuity, tone, mascots)
  </text>

  <circle cx="90" cy="670" r="6" fill="#4a90e2"/>
  <text x="110" y="675" font-size="16" fill="#ffffff" font-family="Arial">
    Conversational drift (docs, micro-commits, style)
  </text>

</svg>

